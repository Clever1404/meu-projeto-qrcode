<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fale Conosco</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">
    <div class="max-w-lg mx-auto bg-white p-6 rounded-lg shadow-md">
        <!-- Links de Navegação -->
        <div class="mb-6 text-sm text-gray-500">
            <a href="/" class="text-blue-600 hover:underline">← Voltar para o Gerador</a>
        </div>

        <h1 class="text-2xl font-bold mb-6 text-center text-gray-800">Fale Conosco</h1>
        
        <!-- Mensagem de Sucesso -->
        {% if sucesso %}
        <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-6 text-center text-sm font-semibold">
            Mensagem enviada com sucesso! Entraremos em contato em breve.
        </div>
        {% endif %}

        <!-- Formulário -->
        <form method="POST" class="space-y-4">
            <div>
                <label class="block font-semibold text-gray-700 mb-1">Nome:</label>
                <input type="text" name="nome" required class="border p-2 rounded w-full focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block font-semibold text-gray-700 mb-1">E-mail:</label>
                <input type="email" name="email" required class="border p-2 rounded w-full focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block font-semibold text-gray-700 mb-1">Mensagem:</label>
                <textarea name="mensagem" rows="4" required class="border p-2 rounded w-full focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            </div>

            <button type="submit" class="bg-blue-600 text-white font-bold p-2 rounded w-full hover:bg-blue-700 transition">
                Enviar Mensagem
            </button>
        </form>
    </div>
</body>
</html>
