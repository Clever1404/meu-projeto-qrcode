<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fale Conosco</title>
    <style>
        /* CSS Embutido - Funciona direto no programa sem precisar de nuvem ou arquivos externos */
        body {
            background-color: #f3f4f6;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            padding: 2rem;
            margin: 0;
            box-sizing: border-box;
        }
        .max-w-lg {
            max-width: 32rem;
        }
        .mx-auto {
            margin-left: auto;
            margin-right: auto;
        }
        .bg-white {
            background-color: #ffffff;
        }
        .p-6 {
            padding: 1.5rem;
        }
        .rounded-lg {
            border-radius: 0.5rem;
        }
        .shadow-md {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .mb-6 {
            margin-bottom: 1.5rem;
        }
        .text-sm {
            font-size: 0.875rem;
        }
        .text-gray-500 {
            color: #6b7280;
        }
        .text-blue-600 {
            color: #2563eb;
        }
        .text-blue-600:hover {
            text-decoration: underline;
        }
        .text-2xl {
            font-size: 1.5rem;
        }
        .font-bold {
            font-weight: 700;
        }
        .text-center {
            text-align: center;
        }
        .text-gray-800 {
            color: #1f2937;
        }
        .space-y-4 > * + * {
            margin-top: 1rem;
        }
        .block {
            display: block;
        }
        .font-semibold {
            font-weight: 600;
        }
        .text-gray-700 {
            color: #374151;
        }
        .mb-1 {
            margin-bottom: 0.25rem;
        }
        .border {
            border: 1px solid #d1d5db;
        }
        .p-2 {
            padding: 0.5rem;
        }
        .rounded {
            border-radius: 0.25rem;
        }
        .w-full {
            width: 100%;
        }
        input, textarea {
            box-sizing: border-box;
            transition: all 0.2s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.5);
        }
        .bg-blue-600 {
            background-color: #2563eb;
        }
        .text-white {
            color: #ffffff;
        }
        .bg-blue-600:hover {
            background-color: #1d4ed8;
            cursor: pointer;
        }
        .transition {
            transition: background-color 0.2s;
        }
        .bg-green-100 {
            background-color: #d1fae5;
        }
        .border-green-400 {
            border: 1px solid #34d399;
        }
        .text-green-700 {
            color: #047857;
        }
        .px-4 {
            padding-left: 1rem;
            padding-right: 1rem;
        }
        .py-3 {
            padding-top: 0.75rem;
            padding-bottom: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="max-w-lg mx-auto bg-white p-6 rounded-lg shadow-md">
        <!-- Links de Navegação -->
        <div class="mb-6 text-sm text-gray-500">
            <a href="/" class="text-blue-600">← Voltar para o Gerador</a>
        </div>

        <h1 class="text-2xl font-bold mb-6 text-center text-gray-800">Fale Conosco</h1>
        
        <!-- Mensagem de Sucesso -->
        {% if sucesso %}
        <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-6 text-center text-sm font-semibold">
            Mensagem enviada com sucesso! Entraremos em contato em breve.
        </div>
        {% endif %}

        <!-- Formulário -->
        <form method="POST" class="space-y-4">
            <div>
                <label class="block font-semibold text-gray-700 mb-1">Nome:</label>
                <input type="text" name="nome" required class="border p-2 rounded w-full">
            </div>

            <div>
                <label class="block font-semibold text-gray-700 mb-1">E-mail:</label>
                <input type="email" name="email" required class="border p-2 rounded w-full">
            </div>

            <div>
                <label class="block font-semibold text-gray-700 mb-1">Mensagem:</label>
                <textarea name="mensagem" rows="4" required class="border p-2 rounded w-full"></textarea>
            </div>

            <button type="submit" class="bg-blue-600 text-white font-bold p-2 rounded w-full transition">
                Enviar Mensagem
            </button>
        </form>
    </div>
</body>
</html>
